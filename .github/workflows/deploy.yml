name: Deploy React App to Server

on:
  push:
    branches:
      - main  # Se ejecuta solo cuando hagas push a main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Instalar Node.js y dependencias
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Construir aplicación
        run: npm run build

      # Este paso se conecta al servidor para determinar el directorio de despliegue
      - name: Determinar carpeta de release en el servidor
        id: determine_release
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Obtener la fecha actual en formato YYYY-MM-DD
            release_date=$(date +'%Y-%m-%d')
            base_release_dir="/var/www/react-app/releases/release_${release_date}"
            # Si ya existe la carpeta base, se ańade sufijo incremental
            if [ -d "$base_release_dir" ]; then
              i=1
              while [ -d "${base_release_dir}_$i" ]; do
                i=$((i+1))
              done
              RELEASE_DIR="${base_release_dir}_$i"
            else
              RELEASE_DIR="$base_release_dir"
            fi
            # Crear la carpeta de release
            mkdir -p "$RELEASE_DIR"
            # Imprimir el nombre del directorio para capturarlo como salida
            echo "$RELEASE_DIR"

      # Se utiliza el directorio determinado para subir el build
      - name: Subir archivos al servidor vía scp
        uses: appleboy/scp-action@v0.1.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/*"
          target: "${{ steps.determine_release.outputs.stdout }}"

      # Finalmente, se actualiza el symlink y se recarga Nginx
      - name: Actualizar symlink y recargar Nginx
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            RELEASE_DIR="${{ steps.determine_release.outputs.stdout }}"
            ln -sfn "$RELEASE_DIR" /var/www/react-app/current
            systemctl reload nginx
            echo "Symlink actualizado a $RELEASE_DIR"

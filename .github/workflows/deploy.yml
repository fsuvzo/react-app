name: Deploy React App to Server

on:
  push:
    branches:
      - main  # Se ejecuta solo cuando hagas push a main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cůdigo
        uses: actions/checkout@v3

      - name: Instalar Node.js y dependencias
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Construir aplicaciůn
        run: npm run build

      - name: Determinar carpeta de release en el servidor
        id: determine_release
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Obtener la fecha actual en formato YYYY-MM-DD
            release_date=$(date +'%Y-%m-%d')
            base_release_dir="/var/www/react-app/releases/release_${release_date}"
            # Si ya existe la carpeta base, se aŮade sufijo incremental
            if [ -d "$base_release_dir" ]; then
              i=1
              while [ -d "${base_release_dir}_$i" ]; do
                i=$((i+1))
              done
              RELEASE_DIR="${base_release_dir}_$i"
            else
              RELEASE_DIR="$base_release_dir"
            fi
            # Crear la carpeta de release
            mkdir -p "$RELEASE_DIR"
            # Registrar la salida para usarla en otros pasos
            echo "release_dir=$RELEASE_DIR" >> $GITHUB_OUTPUT

      - name: Subir archivos al servidor vŪa scp
        uses: appleboy/scp-action@v0.1.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/*"
          target: "${{ steps.determine_release.outputs.release_dir }}"

      - name: Actualizar symlink y recargar Nginx
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            latest_release="${{ steps.determine_release.outputs.release_dir }}"
            ln -sfn "$latest_release" /var/www/react-app/current
            systemctl reload nginx
            echo "Symlink actualizado a $latest_release"

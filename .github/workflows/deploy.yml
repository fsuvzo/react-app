name: Deploy React App to Server

on:
  push:
    branches:
      - main  # Se ejecutar  solo cuando hagas push a main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout cḃdigo
        uses: actions/checkout@v3

      - name: Instalar Node.js y dependencias
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Construir aplicaciḃn
        run: npm run build

      - name: Subir archivos al servidor vḂa rsync
        uses: appleboy/scp-action@v0.1.2
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "build/*"
          target: "/var/www/react-app/releases/release_$(date +'%Y-%m-%d_%H-%M-%S')"

      - name: Cambiar symlink a la nueva versiḃn
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            latest_release=$(ls -td /var/www/react-app/releases/* | head -1)
            ln -sfn $latest_release /var/www/react-app/current
            systemctl reload nginx

